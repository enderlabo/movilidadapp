name: tarifario_movilidad
description: Tarifario de movilidad para empresa de andamios.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navegación
  go_router: ^14.6.2

  # Inyección de dependencias
  get_it: ^8.0.3

  # Dominio / FP
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6

  # Cache local offline — reemplaza Hive para evitar conflicto de analyzer
  shared_preferences: ^2.5.3

  # Google Maps — mobile/desktop
  google_maps_flutter: ^2.10.0
  google_maps_flutter_web: ^0.5.10

  # HTTP
  dio: ^5.8.0

  # Conectividad
  connectivity_plus: ^6.1.4

  # Variables de entorno
  flutter_dotenv: ^5.2.1

  # Formateo de moneda
  intl: ^0.20.2

  # Utilidades
  uuid: ^4.5.1
  logger: ^2.5.0
  collection: ^1.19.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Generadores de código — versiones compatibles con Dart 3.11
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.3
  riverpod_generator: ^2.6.1

  # Testing
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.1.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
